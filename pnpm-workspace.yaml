packages:
  - .

# Vent minst 4 døgn før pnpm får installere helt ny-publiserte pakkeversjoner.
# Dette reduserer risikoen for å ta inn kompromitterte eller ondsinnede releases
# før de rekker å bli oppdaget og fjernet fra npm-registeret.
minimumReleaseAge: 5760

lockfileIncludeTarballUrl: true

# Anbefalt ekstra guardrail (hindrer å gå til versjoner med mindre "trust evidence")
# trustPolicy: no-downgrade

# Remove nextjs-cache-handler and lru-cache when version 3 (needed for Next.js 16) is older than 7 days
minimumReleaseAgeExclude:
  - '@navikt/*'
  - '@fortedigital/nextjs-cache-handler'
  - 'lru-cache'