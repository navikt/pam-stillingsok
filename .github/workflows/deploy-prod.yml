name: deploy-prod
run-name: deploy-prod ${{ inputs.version || github.event.release.tag_name }}
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (for example: 26.061.102232)'
        required: true
        type: string
  release:
    types: [published]

jobs:
  call-workflow:
    permissions:
      contents: write
      id-token: write
    uses: navikt/pam-deploy/.github/workflows/deploy-prod.yml@v9
    with:
      NAIS_RESOURCE: .nais/nais.yml
      NAIS_VARS: .nais/prod.yml
      VERSION_TAG: ${{ inputs.version }}
  deploy-valkey:
    name: Deploy valkey
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Deploy Valkey
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/valkey.yml
          VARS: .nais/prod.yml
