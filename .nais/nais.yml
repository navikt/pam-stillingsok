apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: pam-stillingsok
  namespace: teampam
  labels:
    team: teampam
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
spec:
  image: {{ image }}
  port: 3000
  replicas:
    min: 2
    max: 6
    cpuThresholdPercentage: 60
  liveness:
    initialDelay: 30
    path: /api/internal/isAlive
  readiness:
    initialDelay: 30
    path: /api/internal/isReady
  resources:
    requests:
      cpu: 1000m
      memory: 512Mi
    limits:
      memory: 2048Mi
  prometheus:
    enabled: true
    path: /api/internal/prometheus
  observability:
    logging:
      destinations:
        - id: loki
        - id: elastic
    autoInstrumentation:
      enabled: true
      runtime: nodejs
  vault:
    enabled: false
  idporten:
    enabled: true
    sidecar:
      enabled: true
      level: Level3
  tokenx:
    enabled: true
  ingresses:
  {{#each ingress as |url|}}
     - {{url}}
  {{/each}}
  env:
  {{#each env}}
     - name: {{@key}}
       value: "{{this}}"
  {{/each}}
  accessPolicy:
    inbound:
      rules:
        - application: pam-aduser
    outbound:
      rules:
        - application: search-api
          namespace: arbeidsplassen
        - application: arbeidsplassen-metrics-api
          namespace: arbeidsplassen
        - application: pam-aduser
        - application: pam-geografi
      external:
        - host: {{ arbeidsplassen_domain }}
        - host: umami.nav.no
        - host: sentry.gc.nav.no
        - host: cdn.nav.no
        - host: {{ openai_endpoint }}
  envFrom:
    - secret: pam-ai
    - secret: pam-stillingsok-internal-revalidate
  valkey:
    - instance: {{ valkey.instance }}
      access: readwrite
  filesFrom:
    - emptyDir:
        medium: Memory
      mountPath: /app/.next/cache
      
